<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentMon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="logo">
        <div class="logo-icon">A</div>
        <div>
          <h1>AgentMon</h1>
          <div class="subtitle"><span class="pulse-dot"></span>Token Monitor &amp; Agent Manager</div>
        </div>
      </div>
      <div class="header-right">
        <nav class="tab-btns" id="navTabs">
          <button class="tbtn active" data-tab="tokmon">Tokens</button>
          <button class="tbtn" data-tab="sessions">Sessions</button>
          <button class="tbtn" data-tab="skills">Skills</button>
          <button class="tbtn" data-tab="mcp">MCP</button>
          <button class="tbtn" data-tab="settings">Settings</button>
        </nav>
        <a class="github-link" href="https://github.com/xiehuacheng/AgentMon" target="_blank" rel="noreferrer" aria-label="Open GitHub repository" title="GitHub">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 2C6.48 2 2 6.58 2 12.23c0 4.52 2.87 8.35 6.84 9.71.5.09.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.78.62-3.37-1.21-3.37-1.21-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.36 1.12 2.93.86.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.28 9.28 0 0 1 12 6.91c.85 0 1.7.12 2.5.35 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.8-4.57 5.05.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.81 0 .27.18.59.69.49A10.05 10.05 0 0 0 22 12.23C22 6.58 17.52 2 12 2Z"></path>
          </svg>
        </a>
        <div class="header-actions" id="headerActions"></div>
      </div>
    </header>
    <div id="content"></div>
  </div>
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="tokmon-module.js"></script>
  <script src="app.js"></script>
</body>
</html>
